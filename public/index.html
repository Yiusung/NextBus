<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HK BUS ETA</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      /* Light Theme: HK Street Signage */
      --bg: #f0ece4;
      --surface: #faf8f3;
      --card: #ffffff;
      --card-border: #d4cfc5;
      --text: #1a1610;
      --text-sec: #5a5347;
      --text-muted: #8c8478;

      --kmb: #cc2233;
      --kmb-bg: #fdf0f0;
      --ctb: #d4880a;
      --ctb-bg: #fdf6e8;
      --nlb: #1a6b3c;
      --nlb-bg: #eef8f2;

      --radius: 6px;
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    [data-theme="dark"] {
      /* Dark Theme: 1990s Mong Kok Neon */
      --bg: #0a0a0f;
      --surface: #101018;
      --card: #12121c;
      --card-border: #1e1e2e;
      --text: #e8e4f0;
      --text-sec: #8a849a;
      --text-muted: #504c60;

      --kmb: #ff2d78;
      --kmb-bg: rgba(255, 45, 120, 0.1);
      --ctb: #ff8c2a;
      --ctb-bg: rgba(255, 140, 42, 0.1);
      --nlb: #39ff8e;
      --nlb-bg: rgba(57, 255, 142, 0.1);
      --radius: 4px;
    }

    body {
      margin: 0;
      font-family: var(--font-main);
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .top-bar h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 1px;
    }
    [data-theme="dark"] .top-bar h1 {
      text-shadow: 0 0 8px rgba(255, 45, 120, 0.8);
      color: var(--kmb);
    }
    .controls button {
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 20px;
      margin-left: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
    }
    [data-theme="dark"] .controls button {
      border-color: var(--text-muted);
      background: transparent;
      color: var(--text-sec);
    }

    /* Map Area */
    #map-container {
      height: 320px;
      width: 100%;
      opacity: 1;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 15px;

      transition: height 0.3s ease-out, opacity 0.2s ease-out, margin 0.3s ease-out;

      position: relative;
      overflow: hidden;
      display: block;
      will-change: height, opacity;
      background-color: var(--surface);
    }

    /* 1. Base button style */
    .map-overlay-btn {
        position: absolute;
        bottom: 15px;
        right: 60px;
        z-index: 1000;
        width: 44px;
        height: 44px;
        background-color: var(--surface);
        color: var(--text-main);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        transition: background-color 0.2s, transform 0.1s; /* Added transform transition */
    }

    /* 2. Visual feedback for mouse users (desktop) */
    .map-overlay-btn:hover {
        background-color: var(--card-bg);
    }

    /* 3. Visual feedback for tap/click (mobile & desktop) */
    .map-overlay-btn:active {
        transform: scale(0.95);
    }

    /* Renamed from .hidden to .collapsed to avoid conflicts with standard 'hidden' utility classes */
    #map-container.collapsed {
      height: 0 !important;
      opacity: 0;
      border-bottom: none;
      margin-bottom: 0 !important;
    }
    [data-theme="dark"] .leaflet-tile {
      filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7);
    }

    /* ETA List */
    #eta-list {
      padding: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    .stop-separator {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-sec);
      padding: 8px 0;
      border-bottom: 1px dashed var(--card-border);
      margin-bottom: 12px;
      margin-top: 16px;
    }

    .eta-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .eta-card.too-far:not(.starred) {
      opacity: 0.55;
    }

    /* Operator specific styles */
    .eta-card.kmb { border-left: 4px solid var(--kmb); }
    .eta-card.ctb { border-left: 4px solid var(--ctb); }
    .eta-card.nlb { border-left: 4px solid var(--nlb); }

    [data-theme="dark"] .eta-card.kmb { box-shadow: 0 0 10px var(--kmb-bg); border-color: var(--card-border); border-left: 4px solid var(--kmb); }
    [data-theme="dark"] .eta-card.ctb { box-shadow: 0 0 10px var(--ctb-bg); border-color: var(--card-border); border-left: 4px solid var(--ctb); }
    [data-theme="dark"] .eta-card.nlb { box-shadow: 0 0 10px var(--nlb-bg); border-color: var(--card-border); border-left: 4px solid var(--nlb); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      overflow: hidden;
    }
    .route-group {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      /*gap: 10px;*/
    }
    .route-num {
      font-size: 1.5rem;
      font-weight: 900;
    }
    .kmb .route-num { color: var(--kmb); }
    .ctb .route-num { color: var(--ctb); }
    .nlb .route-num { color: var(--nlb); }

    [data-theme="dark"] .kmb .route-num { text-shadow: 0 0 8px var(--kmb); }
    [data-theme="dark"] .ctb .route-num { text-shadow: 0 0 8px var(--ctb); }
    [data-theme="dark"] .nlb .route-num { text-shadow: 0 0 8px var(--nlb); }

    .op-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 18px;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: var(--radius);
      margin-left: 8px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-transform: uppercase;
    }
    .kmb .op-badge { background: var(--kmb-bg); color: var(--kmb); border: 1px solid var(--kmb); }
    .ctb .op-badge { background: var(--ctb-bg); color: var(--ctb); border: 1px solid var(--ctb); }
    .nlb .op-badge { background: var(--nlb-bg); color: var(--nlb); border: 1px solid var(--nlb); }

    .destination {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      flex-grow: 1;
      text-align: right;
      margin-left: 10px;

      /*These three lines prevent 2-row jump*/
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .eta-times {
      display: flex;
      align-items: center;
      gap: 12px;
      font-variant-numeric: tabular-nums;
    }
    .eta-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .eta-chip {
      font-size: 1rem;
      font-weight: 600;
    }
    .eta-chip.hot { font-weight: 800; }
    .kmb .eta-chip.hot, .kmb .eta-chip.warm { color: var(--kmb); }
    .ctb .eta-chip.hot, .ctb .eta-chip.warm { color: var(--ctb); }
    .nlb .eta-chip.hot, .nlb .eta-chip.warm { color: var(--nlb); }

    [data-theme="dark"] .eta-chip.hot { text-shadow: 0 0 8px currentColor; }

    .eta-chip.cool { color: var(--text-muted); font-weight: 400; }
    .eta-chip.na { color: var(--text-muted); font-style: italic; font-size: 0.9rem; }

    .star-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.4;
      color: var(--text-muted);
    }
    .starred .star-btn {
      opacity: 1;
    }
    .kmb.starred .star-btn { color: var(--kmb); text-shadow: 0 0 8px var(--kmb); }
    .ctb.starred .star-btn { color: var(--ctb); text-shadow: 0 0 8px var(--ctb); }
    .nlb.starred .star-btn { color: var(--nlb); text-shadow: 0 0 8px var(--nlb); }

    .starred {
      border: 2px solid currentColor;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 2000;
    }
    #toast.show { opacity: 1; }

    .data-disclaimer {
        text-align: center;
        padding: 30px 0 50px 0; /* Space for mobile bottom bars */
        font-size: 0.75rem;
        letter-spacing: 0.5px;
    }

    /* Light Theme: Official Notice Style */
    [data-theme="light"] .data-disclaimer p {
        color: var(--text-muted);
        display: inline-block;
        padding: 4px 12px;
        border: 1px solid var(--card-border);
        background: var(--surface);
        text-transform: uppercase;
        font-weight: 500;
    }

    /* Dark Theme: Muted Neon Style */
    [data-theme="dark"] .data-disclaimer p {
        color: var(--text-sec);
        border: none;
        background: transparent;
        opacity: 0.6;
        /* Subtle glow to match the 1990s neon theme */
        text-shadow: 0 0 5px rgba(138, 132, 154, 0.3);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1 data-i18n="appTitle">HK BUS ETA</h1>
    <div class="controls">
      <button id="btnMap" aria-label="Toggle map" data-i18n="mapLabel">🌍地圖</button>
      <button id="btnLang" aria-label="Toggle language">EN</button>
      <button id="btnTheme" aria-label="Toggle theme">◐</button>
    </div>
  </div>

  <div id="map-container">
      <button id="btn-recenter" class="map-overlay-btn" title="My location">
        🎯
      </button>
  </div>

  <div id="eta-list">
    <div id="status-message" style="text-align:center; padding: 20px; color: var(--text-muted);" data-i18n="loadingData">
      正在載入資料...
    </div>
    <div id="cards-container"></div>
    <footer class="data-disclaimer">
        <p data-i18n="disclaimerText"></p>
    </footer>
  </div>

  <div id="toast"></div>

  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>

  <script src="/js/stars.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/geo.js"></script>
  <script src="/js/eta.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/map.js"></script>


</body>
</html>
